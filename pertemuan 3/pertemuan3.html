<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
        }

        .login-container {
            width: 350px;
            padding: 50px 40px 40px 40px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: #fff;
            position: relative;
        }

        .logo {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .login-container h2 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            outline: none;
            background: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .login-container input:focus {
            box-shadow: 0 0 10px #ff9ad5;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: #ff6ec7;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-container button:hover {
            background: #ff4eb5;
            transform: scale(1.05);
        }

        .extra {
            margin-top: 15px;
            font-size: 13px;
        }

        .extra a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .extra a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">
            💖
        </div>

        <h2>Sweet Login</h2>

        <form>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button type="submit">Login</button>
        </form>

        <div class="extra">
            Belum punya akun? <a href="#">Daftar</a>
        </div>
    </div>

</body>
</html>
